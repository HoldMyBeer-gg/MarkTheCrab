<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remarkable</title>
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="styles/toolbar.css">
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar" class="toolbar">
    <div class="toolbar-group">
      <button data-action="new" title="New (Ctrl+N)">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
      <button data-action="open" title="Open (Ctrl+O)">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button data-action="save" title="Save (Ctrl+S)">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button data-action="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
      <button data-action="italic" title="Italic (Ctrl+I)"><em>I</em></button>
      <button data-action="strikethrough" title="Strikethrough (Ctrl+D)"><s>S</s></button>
      <button data-action="heading1" title="Heading 1 (Ctrl+1)">H1</button>
      <button data-action="heading2" title="Heading 2 (Ctrl+2)">H2</button>
      <button data-action="heading3" title="Heading 3 (Ctrl+3)">H3</button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button data-action="link" title="Link (Ctrl+L)">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
      <button data-action="image" title="Image (Ctrl+Shift+I)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <button data-action="table" title="Table (Ctrl+Shift+T)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      </button>
      <button data-action="hr" title="Horizontal Rule (Ctrl+H)">―</button>
      <button data-action="code" title="Code Block">{ }</button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button data-action="ul" title="Unordered List">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg>
      </button>
      <button data-action="ol" title="Ordered List">
        <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="8">1</text><text x="2" y="14" font-size="8">2</text><text x="2" y="20" font-size="8">3</text></svg>
      </button>
      <button data-action="checklist" title="Checklist">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="6" height="6" rx="1"/><polyline points="4.5 8 6 9.5 8.5 6.5"/><line x1="12" y1="8" x2="21" y2="8"/><rect x="3" y="14" width="6" height="6" rx="1"/><line x1="12" y1="17" x2="21" y2="17"/></svg>
      </button>
      <button data-action="blockquote" title="Blockquote">
        <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
      </button>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-group">
      <select id="theme-select" title="Theme">
        <option value="github">GitHub</option>
        <option value="dark">Dark</option>
        <option value="foghorn">Foghorn</option>
        <option value="handwriting">Handwriting</option>
        <option value="markdown">Markdown</option>
        <option value="metro-vibes">Metro Vibes</option>
        <option value="metro-vibes-dark">Metro Vibes Dark</option>
        <option value="modern">Modern</option>
        <option value="solarized-dark">Solarized Dark</option>
        <option value="solarized-light">Solarized Light</option>
      </select>
      <button data-action="toggle-preview" title="Toggle Preview">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button data-action="toggle-layout" title="Toggle Layout">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
      </button>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main" class="main horizontal">
    <!-- Editor pane -->
    <div id="editor-pane" class="pane editor-pane">
      <div id="editor"></div>
    </div>

    <!-- Resizer -->
    <div id="resizer" class="resizer"></div>

    <!-- Preview pane -->
    <div id="preview-pane" class="pane preview-pane">
      <div id="preview" class="remarkable-preview"></div>
    </div>
  </div>

  <!-- Find bar -->
  <div id="findbar" class="findbar hidden">
    <div class="findbar-row">
      <input type="text" id="find-input" placeholder="Find..." spellcheck="false">
      <label><input type="checkbox" id="find-regex"> Regex</label>
      <label><input type="checkbox" id="find-case"> Match Case</label>
      <label><input type="checkbox" id="find-whole"> Whole Word</label>
      <span id="find-count" class="find-count"></span>
      <button id="find-prev" title="Previous">&#9650;</button>
      <button id="find-next" title="Next">&#9660;</button>
      <button id="find-close" title="Close">&times;</button>
    </div>
    <div class="findbar-row">
      <input type="text" id="replace-input" placeholder="Replace..." spellcheck="false">
      <button id="replace-one">Replace</button>
      <button id="replace-all">Replace All</button>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar" class="statusbar">
    <span id="status-file">Untitled</span>
    <span id="status-modified" class="hidden">*</span>
    <span class="statusbar-spacer"></span>
    <span id="status-cursor">Ln 1, Col 1</span>
    <span id="status-words">0 words</span>
    <span id="status-chars">0 chars</span>
  </div>

  <!-- Dialogs -->
  <dialog id="link-dialog" class="remarkable-dialog">
    <h3>Insert Link</h3>
    <label>URL<input type="text" id="link-url" placeholder="https://"></label>
    <label>Text<input type="text" id="link-text" placeholder="Link text"></label>
    <div class="dialog-buttons">
      <button id="link-cancel">Cancel</button>
      <button id="link-insert" class="primary">Insert</button>
    </div>
  </dialog>

  <dialog id="image-dialog" class="remarkable-dialog">
    <h3>Insert Image</h3>
    <label>URL or path
      <div class="input-with-button">
        <input type="text" id="image-url" placeholder="https:// or local path">
        <button id="image-browse" type="button">Browse...</button>
      </div>
    </label>
    <label>Alt text<input type="text" id="image-alt" placeholder="Description"></label>
    <label>Title<input type="text" id="image-title" placeholder="Title (optional)"></label>
    <p class="dialog-hint">Tip: You can also drag &amp; drop or paste (Ctrl+V) images directly into the editor.</p>
    <div class="dialog-buttons">
      <button id="image-cancel">Cancel</button>
      <button id="image-insert" class="primary">Insert</button>
    </div>
  </dialog>

  <dialog id="table-dialog" class="remarkable-dialog">
    <h3>Insert Table</h3>
    <label>Rows<input type="number" id="table-rows" value="3" min="1" max="50"></label>
    <label>Columns<input type="number" id="table-cols" value="3" min="1" max="20"></label>
    <div class="dialog-buttons">
      <button id="table-cancel">Cancel</button>
      <button id="table-insert" class="primary">Insert</button>
    </div>
  </dialog>

  <!-- highlight.js theme -->
  <link rel="stylesheet" href="vendor/hljs-github.css">

  <!-- Bundled app (CodeMirror + highlight.js + app logic) -->
  <script type="module" src="dist/app.js"></script>
</body>
</html>
